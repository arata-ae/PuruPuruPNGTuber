name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static-checks:
    name: Static checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JavaScript syntax
        run: node --check app.js

      - name: Check Python syntax
        run: python -m py_compile scripts/run_local_server.py

      - name: Run static tests
        run: python -m unittest tests.test_project_static
