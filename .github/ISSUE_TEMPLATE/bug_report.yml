name: Bug report
description: Report a reproducible bug
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Remove private assets or personal information before posting.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Start the local server
        2. Open ...
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Avatar rendering
        - Face tracking
        - Mouth animation
        - OBS mode
        - Character setup
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 126, Edge 126, etc.
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS, Ubuntu, etc.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Console output or screenshots
      description: Remove private information before posting.
    validations:
      required: false
